name: Feature request
description: Suggest a new feature or improvement for Pricoteka.
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem or need should this solve?
      placeholder: I want to be able to ... because ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behavior or user experience you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches or workarounds have you considered?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the conditions that would make this feature complete.
      placeholder: |
        - Users can ...
        - The page shows ...
        - Errors are handled by ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, references, or related issues if useful.
    validations:
      required: false
