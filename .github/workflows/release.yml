name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      raw_tag: ${{ steps.tag.outputs.raw_tag }}
      is_prerelease: ${{ steps.tag.outputs.is_prerelease }}

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0

      - name: Validate SemVer tag
        id: tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if ! VERSION="$(npm exec --yes --package semver -- semver "$TAG_NAME")"; then
            echo "Tag '$TAG_NAME' is not a valid SemVer version."
            exit 1
          fi

          VERSION_CORE="${VERSION%%+*}"

          {
            echo "raw_tag=$TAG_NAME"
            echo "version=$VERSION"
            if [[ "$VERSION_CORE" == *-* ]]; then
              echo "is_prerelease=true"
            else
              echo "is_prerelease=false"
            fi
          } >> "$GITHUB_OUTPUT"

  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Core Build
        run: pnpm --filter @pricoteka/core build

      - name: API Build
        run: pnpm --filter @pricoteka/api build

      - name: UI Core Build
        run: pnpm --filter @pricoteka/ui-core build

      - name: App Build
        run: pnpm --filter @pricoteka/app build

      - name: Website Build
        run: pnpm --filter @pricoteka/website build

      - name: Test
        run: pnpm test

  docker:
    name: Publish Docker Image (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    needs:
      - validate
      - verify

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            dockerfile: docker/api.Dockerfile
            image: pricoteka-api
          - name: frontend
            dockerfile: docker/frontend.Dockerfile
            image: pricoteka-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker tags
        id: docker_tags
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.image }}
          IS_PRERELEASE: ${{ needs.validate.outputs.is_prerelease }}
          RAW_TAG: ${{ needs.validate.outputs.raw_tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail

          IMAGE="${IMAGE,,}"

          {
            echo "tags<<EOF"
            echo "$IMAGE:$VERSION"
            if [[ "$RAW_TAG" != "$VERSION" ]]; then
              echo "$IMAGE:$RAW_TAG"
            fi
            if [[ "$IS_PRERELEASE" == "false" ]]; then
              echo "$IMAGE:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.image.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - verify
      - docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog release notes
        id: changelog
        run: |
          set -euo pipefail

          if [[ ! -f CHANGELOG.md ]]; then
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          awk '
            /^## / {
              if (seen) {
                exit
              }
              seen = 1
            }
            seen { print }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_notes=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release from changelog
        if: steps.changelog.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          prerelease: ${{ needs.validate.outputs.is_prerelease }}

      - name: Create GitHub Release with generated notes
        if: steps.changelog.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ needs.validate.outputs.is_prerelease }}
